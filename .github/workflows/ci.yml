name: CI Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ============================================================
  # Job 1: Format checks (fast feedback, no build needed)
  # ============================================================
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- C: clang-format ---
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Format check (C)
        run: |
          find xinputedge-receiver/src xinputedge-receiver/include xinputedge-receiver/protocol \
            \( -name '*.c' -o -name '*.h' \) \
            | xargs clang-format --dry-run --Werror

      # --- C#: dotnet format ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages (for format)
        run: dotnet restore xinputedge-sender/xinputedge-sender.csproj

      - name: Format check (C#)
        run: |
          dotnet format xinputedge-sender/xinputedge-sender.csproj \
            --verify-no-changes --verbosity diagnostic

  # ============================================================
  # Job 2: Static analysis
  # ============================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Static analysis (C — cppcheck)
        run: |
          cppcheck \
            --error-exitcode=1 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            -I xinputedge-receiver/include \
            -I xinputedge-receiver/protocol \
            -I xinputedge-receiver/src \
            xinputedge-receiver/src/

  # ============================================================
  # Job 3: Build (Release) + Unit Tests
  # ============================================================
  build-release:
    name: Build Release & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup C/C++ Compiler
        run: sudo apt-get update && sudo apt-get install -y gcc cmake build-essential

      # --- C#: Sender ---
      - name: Build C# Sender (Release)
        run: |
          dotnet build xinputedge-sender/examples/BasicSender/BasicSender.csproj \
            -c Release -warnaserror

      # --- C99 ---
      - name: Configure CMake (Release)
        run: |
          cmake -S xinputedge-receiver -B xinputedge-receiver/build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=ON \
            -DBUILD_TESTS=ON

      - name: Build C Receiver (Release)
        run: cmake --build xinputedge-receiver/build/release

      - name: Run unit tests (Release)
        run: |
          cd xinputedge-receiver/build/release
          ctest --output-on-failure --verbose -j$(nproc)

  # ============================================================
  # Job 4: Build Debug & Test (Fast Job)
  # ============================================================
  build-debug-fast:
    name: Build Debug & Test (Fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup C/C++ Compiler
        run: sudo apt-get update && sudo apt-get install -y gcc cmake build-essential

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: xinputedge-receiver/build/debug/_deps
          key: ${{ runner.os }}-gtest-${{ hashFiles('xinputedge-receiver/**/CMakeLists.txt') }}

      - name: Configure CMake (Debug)
        run: |
          cmake -S xinputedge-receiver -B xinputedge-receiver/build/debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_EXAMPLES=ON \
            -DBUILD_TESTS=ON

      - name: Build C Receiver (Debug)
        run: cmake --build xinputedge-receiver/build/debug

      - name: Run unit tests (Debug)
        run: |
          cd xinputedge-receiver/build/debug
          ctest --output-on-failure -j$(nproc)

  # ============================================================
  # Job 5: Valgrind & Coverage (Slow Job)
  # ============================================================
  coverage-valgrind-slow:
    name: Coverage & Valgrind (Slow)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Compiler and Tools
        run: sudo apt-get update && sudo apt-get install -y gcc cmake build-essential valgrind gcovr

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: xinputedge-receiver/build/coverage/_deps
          key: ${{ runner.os }}-gtest-coverage-${{ hashFiles('xinputedge-receiver/**/CMakeLists.txt') }}

      - name: Configure CMake (Coverage & Valgrind)
        run: |
          cmake -S xinputedge-receiver -B xinputedge-receiver/build/coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_EXAMPLES=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=ON \
            -DENABLE_VALGRIND=ON

      - name: Build
        run: cmake --build xinputedge-receiver/build/coverage

      - name: Run Tests (Valgrind)
        run: |
          cd xinputedge-receiver/build/coverage
          ctest -N -V | grep "Test command:" | sed 's/.*Test command: //' | while IFS= read -r cmd; do
            eval valgrind --leak-check=full \
                     --show-leak-kinds=all \
                     --track-origins=yes \
                     --error-exitcode=1 \
                     $cmd
          done

      - name: Generate Coverage Report
        id: coverage
        run: |
          cd xinputedge-receiver/build/coverage
          set +e
          gcovr \
            --root ${{ github.workspace }}/xinputedge-receiver \
            --filter ${{ github.workspace }}/xinputedge-receiver/src \
            --html-details coverage.html \
            --txt coverage.txt \
            --print-summary \
            --fail-under-line 25 \
            --fail-under-branch 25 \
            --txt-metric branch \
            . > summary.txt
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      - name: Output Coverage to Job Summary
        if: always()
        run: |
          cd xinputedge-receiver/build/coverage
          if [ -f "summary.txt" ] && [ -f "coverage.txt" ]; then

            echo "### Coverage Status" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "${{ steps.coverage.outputs.exit_code }}" = "0" ]; then
              echo "✅ **Coverage threshold satisfied**" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Coverage threshold not met**" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Low Coverage Files (<50%)" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            awk '$4 ~ /%/ && $4+0 < 50 {print}' coverage.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Click to view full coverage details</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat coverage.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if coverage threshold not met
        if: steps.coverage.outputs.exit_code != '0'
        run: exit 1

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: xinputedge-receiver/build/coverage/coverage*.html