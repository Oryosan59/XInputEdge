name: CI Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ============================================================
  # Job 1: Format checks
  # ============================================================
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Format check (C)
        run: |
          find xinputedge-receiver/src xinputedge-receiver/include xinputedge-receiver/protocol \
            \( -name '*.c' -o -name '*.h' \) \
            | xargs clang-format --dry-run --Werror

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore xinputedge-sender/xinputedge-sender.csproj

      - name: Format check (C#)
        run: |
          dotnet format xinputedge-sender/xinputedge-sender.csproj \
            --verify-no-changes --verbosity diagnostic

  # ============================================================
  # Job 2: Static Analysis
  # ============================================================
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --quiet \
            --xml \
            --xml-version=2 \
            -I xinputedge-receiver/include \
            xinputedge-receiver/src 2> cppcheck.xml

      - name: Static Analysis Summary
        if: always()
        run: |
          echo "## 🔍 Static Analysis" >> $GITHUB_STEP_SUMMARY

          if [ -s cppcheck.xml ]; then
            COUNT=$(grep -c "<error " cppcheck.xml || true)

            if [ "$COUNT" -eq 0 ]; then
              echo "✅ No issues found" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Issues detected: $COUNT" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Top Issues" >> $GITHUB_STEP_SUMMARY
              echo '```text' >> $GITHUB_STEP_SUMMARY

              grep "<error " cppcheck.xml \
                | sed 's/.*msg="\([^"]*\)".*file="\([^"]*\)".*line="\([^"]*\)".*/\2:\3 \1/' \
                | head -20 \
                >> $GITHUB_STEP_SUMMARY

              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ cppcheck output missing" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Job 3: Build & Test
  # ============================================================
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y gcc cmake build-essential

      - name: Configure
        run: cmake -S xinputedge-receiver -B build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure --verbose | tee test.log

      - name: Test Summary Dashboard
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY

          TOTAL=$(grep -c "Test #" build/test.log || true)
          FAILED=$(grep -c "***Failed" build/test.log || true)

          echo "- Total: $TOTAL" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" -eq 0 ]; then
            echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### ❌ Failed Tests (context)" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY

            grep -n -A3 -B2 "***Failed" build/test.log >> $GITHUB_STEP_SUMMARY

            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Job 4: Valgrind
  # ============================================================
  valgrind:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y valgrind cmake gcc build-essential

      - run: cmake -S xinputedge-receiver -B build -DBUILD_TESTS=ON
      - run: cmake --build build

      - name: Run Valgrind
        run: |
          cd build
          rm -f vg_*.log

          i=0
          ctest -N -V | grep "Test command:" | sed 's/.*Test command: //' | while read cmd; do
            i=$((i+1))
            valgrind \
              --leak-check=full \
              --track-origins=yes \
              --log-file=vg_$i.log \
              $cmd || true
          done

      - name: Leak Dashboard
        if: always()
        run: |
          echo "## 🧠 Memory Analysis (Valgrind)" >> $GITHUB_STEP_SUMMARY

          FILES=$(ls build/vg_*.log 2>/dev/null || true)

          if [ -z "$FILES" ]; then
            echo "⚠️ No Valgrind logs found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          LEAK_COUNT=$(grep -r "definitely lost" build || true | wc -l)

          if [ "$LEAK_COUNT" -eq 0 ]; then
            echo "✅ No leaks detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Memory leaks detected: $LEAK_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### 🔥 Leak Function Ranking" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY

            grep -r "by 0x" build \
              | sed 's/.*by 0x[0-9A-F]*: //' \
              | sort \
              | uniq -c \
              | sort -nr \
              | head -20 \
              >> $GITHUB_STEP_SUMMARY

            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Job 5: Coverage（品質ゲート付き）
  # ============================================================
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y gcc cmake gcovr

      - run: cmake -S xinputedge-receiver -B build -DENABLE_COVERAGE=ON -DBUILD_TESTS=ON
      - run: cmake --build build
      - run: cd build && ctest

      - name: Generate Coverage
        id: coverage
        run: |
          cd build
          set +e

          gcovr \
            --txt coverage.txt \
            --print-summary \
            --fail-under-line 30 \
            --fail-under-branch 25 \
            > summary.txt

          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Coverage Summary
        if: always()
        run: |
          echo "## 📊 Coverage" >> $GITHUB_STEP_SUMMARY

          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat build/summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Low Coverage (<50%)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          awk '$4 ~ /%/ && $4+0 < 50 {print}' build/coverage.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail if coverage not met
        if: steps.coverage.outputs.exit_code != '0'
        run: exit 1