name: CI Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ============================================================
  # Job 1: Format checks
  # ============================================================
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Format check (C)
        run: |
          find xinputedge-receiver/src xinputedge-receiver/include xinputedge-receiver/protocol \
            \( -name '*.c' -o -name '*.h' \) \
            | xargs clang-format --dry-run --Werror
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore xinputedge-sender/xinputedge-sender.csproj
      - name: Format check (C#)
        run: |
          dotnet format xinputedge-sender/xinputedge-sender.csproj \
            --verify-no-changes --verbosity diagnostic

  # ============================================================
  # Job 2: Static Analysis
  # ============================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=checkersReport \
            --quiet \
            --xml \
            --xml-version=2 \
            -I xinputedge-receiver/include \
            xinputedge-receiver/src 2> cppcheck.xml
      - name: Static Analysis Summary
        if: always()
        run: |
          echo "## 🔍 Static Analysis" >> $GITHUB_STEP_SUMMARY
          if [ -s cppcheck.xml ]; then
            COUNT=$(grep -c "<error " cppcheck.xml || true)
            if [ "$COUNT" -eq 0 ]; then
              echo "✅ No issues found" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Issues detected: $COUNT" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>🔽 詳細ログを表示 (Top Issues)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```text' >> $GITHUB_STEP_SUMMARY
              grep "<error " cppcheck.xml \
                | sed 's/.*msg="\([^"]*\)".*file="\([^"]*\)".*line="\([^"]*\)".*/\2:\3 \1/' \
                | head -20 \
                >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ cppcheck output missing" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Job 3: Build & Test (Release)
  # ============================================================
  build-release:
    name: Build & Test (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: sudo apt-get update && sudo apt-get install -y gcc cmake build-essential
      - name: Cache GoogleTest (Release)
        uses: actions/cache@v4
        with:
          path: build/release/_deps
          key: ${{ runner.os }}-gtest-release-${{ hashFiles('xinputedge-receiver/**/CMakeLists.txt') }}
      - name: Build C# (Release)
        run: dotnet build xinputedge-sender/examples/BasicSender/BasicSender.csproj -c Release -warnaserror
      - name: Configure CMake (Release)
        run: cmake -S xinputedge-receiver -B build/release -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
      - name: Build C (Release)
        run: cmake --build build/release
      - name: Run Tests (Release)
        run: |
          cd build/release
          ctest --output-on-failure --verbose | tee test.log
      - name: Test Summary Dashboard (Release)
        if: always()
        run: |
          echo "## 🚀 Release Test Results" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(grep -c "Test #" build/release/test.log || true)
          FAILED=$(grep -c "***Failed" build/release/test.log || true)
          echo "- Total: $TOTAL" >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED" -eq 0 ]; then
            echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔽 失敗したテストの詳細 (context)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            grep -n -A3 -B2 "***Failed" build/release/test.log >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Job 4: Build & Test (Debug)
  # ============================================================
  build-debug:
    name: Build & Test (Debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y gcc cmake build-essential
      - name: Cache GoogleTest (Debug)
        uses: actions/cache@v4
        with:
          path: build/debug/_deps
          key: ${{ runner.os }}-gtest-debug-${{ hashFiles('xinputedge-receiver/**/CMakeLists.txt') }}
      - name: Configure CMake (Debug)
        run: cmake -S xinputedge-receiver -B build/debug -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
      - name: Build C (Debug)
        run: cmake --build build/debug
      - name: Run Tests (Debug)
        run: |
          cd build/debug
          ctest --output-on-failure --verbose | tee test.log
      - name: Test Summary Dashboard (Debug)
        if: always()
        run: |
          echo "## 🐛 Debug Test Results" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(grep -c "Test #" build/debug/test.log || true)
          FAILED=$(grep -c "***Failed" build/debug/test.log || true)
          echo "- Total: $TOTAL" >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED" -eq 0 ]; then
            echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔽 失敗したテストの詳細 (context)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            grep -n -A3 -B2 "***Failed" build/debug/test.log >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Job 5: Valgrind
  # ============================================================
  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y valgrind cmake gcc build-essential
      - name: Cache GoogleTest (Valgrind)
        uses: actions/cache@v4
        with:
          # ValgrindジョブはDebugビルドと同じ設定なのでキャッシュキーを共有して高速化
          path: build/valgrind/_deps
          key: ${{ runner.os }}-gtest-debug-${{ hashFiles('xinputedge-receiver/**/CMakeLists.txt') }}
      - run: cmake -S xinputedge-receiver -B build/valgrind -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
      - run: cmake --build build/valgrind
      - name: Run Valgrind
        run: |
          cd build/valgrind
          rm -f vg_*.log
          i=0
          ctest -N -V | grep "Test command:" | sed 's/.*Test command: //' | while read cmd; do
            i=$((i+1))
            valgrind \
              --leak-check=full \
              --track-origins=yes \
              --log-file=vg_$i.log \
              $cmd || true
          done
      - name: Leak Dashboard
        if: always()
        run: |
          echo "## 🧠 Memory Analysis (Valgrind)" >> $GITHUB_STEP_SUMMARY
          FILES=$(ls build/valgrind/vg_*.log 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "⚠️ No Valgrind logs found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          LEAK_COUNT=$(grep -r "definitely lost" build/valgrind || true | wc -l)
          if [ "$LEAK_COUNT" -eq 0 ]; then
            echo "✅ No leaks detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Memory leaks detected: $LEAK_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔽 リーク関数の詳細 (ランキング)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            grep -r "by 0x" build/valgrind \
              | sed 's/.*by 0x[0-9A-F]*: //' \
              | sort \
              | uniq -c \
              | sort -nr \
              | head -20 \
              >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================
  # Job 6: Coverage（品質ゲート付き）
  # ============================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y gcc cmake gcovr
      - name: Cache GoogleTest (Coverage)
        uses: actions/cache@v4
        with:
          # CoverageジョブもDebugベースなのでキャッシュキーを共有
          path: build/coverage/_deps
          key: ${{ runner.os }}-gtest-debug-${{ hashFiles('xinputedge-receiver/**/CMakeLists.txt') }}
      - run: cmake -S xinputedge-receiver -B build/coverage -DENABLE_COVERAGE=ON -DBUILD_TESTS=ON
      - run: cmake --build build/coverage
      - run: cd build/coverage && ctest
      - name: Generate Coverage
        id: coverage
        run: |
          gcovr build/coverage \
            --root . \
            --filter 'xinputedge-receiver/src/' \
            --filter 'xinputedge-receiver/include/' \
            --filter 'xinputedge-receiver/protocol/' \
            --exclude '.*/tests/.*' \
            --exclude '.*/_deps/.*' \
            --txt build/coverage/coverage.txt \
            --html-details build/coverage/coverage.html \
            --print-summary \
            --fail-under-line 0 \
            --fail-under-branch 0 \
            > build/coverage/summary.txt

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
      - name: Coverage Summary
        if: always()
        run: |
          echo "## 📊 Coverage Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.coverage.outputs.exit_code }}" -eq 0 ]; then
            echo "✅ Coverage threshold satisfied" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Coverage threshold NOT satisfied" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat build/coverage/summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "#### Low Coverage Files (<50%)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          awk '$4 ~ /%/ && $4+0 < 50 {print}' build/coverage/coverage.txt >> $GITHUB_STEP_SUMMARY || true
          grep "^TOTAL" build/coverage/coverage.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>🔽 Click to view full coverage details</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat build/coverage/coverage.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            build/coverage/coverage.txt
            build/coverage/summary.txt
            build/coverage/coverage*.html
      - name: Fail if coverage not met
        if: steps.coverage.outputs.exit_code != '0'
        run: exit 1
