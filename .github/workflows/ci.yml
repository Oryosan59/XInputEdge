name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ============================================================
  # Job 1: Format checks (fast feedback, no build needed)
  # ============================================================
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- C: clang-format ---
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Format check (C)
        run: |
          find xinputedge-receiver/src xinputedge-receiver/include xinputedge-receiver/protocol \
            \( -name '*.c' -o -name '*.h' \) \
            | xargs clang-format --dry-run --Werror

      # --- C#: dotnet format ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages (for format)
        run: dotnet restore xinputedge-sender/xinputedge-sender.csproj

      - name: Format check (C#)
        run: |
          dotnet format xinputedge-sender/xinputedge-sender.csproj \
            --verify-no-changes --verbosity diagnostic

  # ============================================================
  # Job 2: Static analysis
  # ============================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Static analysis (C — cppcheck)
        run: |
          cppcheck \
            --error-exitcode=1 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            -I xinputedge-receiver/include \
            -I xinputedge-receiver/protocol \
            -I xinputedge-receiver/src \
            xinputedge-receiver/src/

  # ============================================================
  # Job 3: Build (Release) + Unit Tests
  # 公開ライブラリとして最終確認する最適化ビルド
  # ============================================================
  build-release:
    name: Build Release & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup C/C++ Compiler
        run: sudo apt-get update && sudo apt-get install -y gcc cmake build-essential

      # --- C#: Sender ---
      - name: Build C# Sender (Release)
        run: |
          dotnet build xinputedge-sender/examples/BasicSender/BasicSender.csproj \
            -c Release -warnaserror

      # --- C99: Release ビルド + ctest ---
      - name: Configure CMake (Release)
        run: |
          cmake -S xinputedge-receiver -B xinputedge-receiver/build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=ON \
            -DBUILD_TESTS=ON

      - name: Build C Receiver (Release)
        run: cmake --build xinputedge-receiver/build/release

      - name: Run unit tests (Release)
        run: |
          cd xinputedge-receiver/build/release
          ctest --output-on-failure

  # ============================================================
  # Job 4: Build Debug & Test (Fast Job)
  # デバッグシンボル付き・Valgrindなしで高速にフィードバック
  # ============================================================
  build-debug-fast:
    name: Build Debug & Test (Fast)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup C/C++ Compiler
        run: sudo apt-get update && sudo apt-get install -y gcc cmake build-essential

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: xinputedge-receiver/build/debug/_deps
          key: ${{ runner.os }}-gtest-v1.14.0

      - name: Configure CMake (Debug)
        run: |
          cmake -S xinputedge-receiver -B xinputedge-receiver/build/debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_EXAMPLES=ON \
            -DBUILD_TESTS=ON

      - name: Build C Receiver (Debug)
        run: cmake --build xinputedge-receiver/build/debug

      - name: Run unit tests (Debug)
        run: |
          cd xinputedge-receiver/build/debug
          ctest --output-on-failure

  # ============================================================
  # Job 5: Valgrind & Coverage (Slow Job)
  # メインへのpush時のみ実行し、PRをブロックしない
  # ============================================================
  coverage-valgrind-slow:
    name: Coverage & Valgrind (Slow)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Compiler and Tools
        run: sudo apt-get update && sudo apt-get install -y gcc cmake build-essential valgrind gcovr

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: xinputedge-receiver/build/coverage/_deps
          key: ${{ runner.os }}-gtest-v1.14.0

      - name: Configure CMake (Coverage & Valgrind)
        run: |
          cmake -S xinputedge-receiver -B xinputedge-receiver/build/coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_EXAMPLES=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=ON \
            -DENABLE_VALGRIND=ON

      - name: Build
        run: cmake --build xinputedge-receiver/build/coverage

      - name: Run Tests (Valgrind)
        run: |
          cd xinputedge-receiver/build/coverage
          ctest --output-on-failure

      - name: Generate Coverage Report
        run: |
          cd xinputedge-receiver/build/coverage
          gcovr --root ${{ github.workspace }}/xinputedge-receiver \
                --filter ${{ github.workspace }}/xinputedge-receiver/src \
                --html-details coverage.html \
                --fail-under-line 70 \
                --branches \
                .

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: xinputedge-receiver/build/coverage/coverage*.html
